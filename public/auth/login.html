<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar - Zonas Escolares</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="auth-shell" aria-labelledby="login-title">
      <section class="auth-card">
        <p class="hero__label">🔐 Entrada segura</p>
        <h1 id="login-title">Zonas Escolares</h1>
        <p class="auth-card__text">
          Estudiantes: usa tu cuenta de Google aprobada por tu maestra o maestro para ver tus zonas.
        </p>
        <button class="google-button" type="button" data-auth-provider="google">Continuar con Google</button>
        <p class="auth-card__note">Solo pedimos tu identidad básica de Google. No usamos permisos de Google Classroom.</p>
        <p class="auth-card__status" data-auth-message role="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="/auth/supabase-config.js"></script>
    <script type="module" src="/auth/login.js"></script>
  </body>
</html>
